<!-- @dsCard group="Componentes" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIcapitei — Card de Imóvel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--grad:linear-gradient(135deg,#7C3AED,#D946EF);--v700:#6D28D9}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",sans-serif;color:#120B23;background:#FAFAFB;padding:48px;line-height:1.5}
  .wrap{max-width:880px;margin:0 auto}
  h1{font-family:"Space Grotesk",sans-serif;font-size:32px;letter-spacing:-.5px;margin-bottom:6px}
  .sub{color:#807D94;margin-bottom:36px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
  .card{background:#fff;border:1px solid #E7E6EE;border-radius:18px;overflow:hidden;box-shadow:0 6px 16px rgba(18,11,35,.06)}
  .photo{height:170px;background:linear-gradient(135deg,#A855F7,#6366F1);position:relative}
  .photo .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.4}
  .photo .ph svg{width:54px;height:54px}
  .ai-badge{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(18,11,35,.7);backdrop-filter:blur(6px);color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px}
  .ai-badge svg{width:13px;height:13px}
  .fav{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .fav svg{width:17px;height:17px}
  .body{padding:18px}
  .price{font-family:"Space Grotesk",sans-serif;font-size:22px;font-weight:700}
  .addr{font-size:14px;color:#807D94;margin:4px 0 14px}
  .feats{display:flex;gap:16px;font-size:13px;color:#423F55;border-top:1px solid #F4F4F7;padding-top:14px}
  .feats span{display:flex;align-items:center;gap:6px}
  .feats svg{width:16px;height:16px;stroke:#7C3AED}
  .tagrow{margin-top:14px;display:flex;gap:8px}
  .t{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:#F5F3FF;color:#6D28D9}
  .t.hot{background:linear-gradient(135deg,#7C3AED,#D946EF);color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>Card de Imóvel</h1>
  <p class="sub">Listagem com selo de IA, favoritar e indicadores de match.</p>

  <div class="grid">
    <div class="card">
      <div class="photo">
        <div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></div>
        <span class="ai-badge"><svg viewBox="0 0 24 24" fill="#D946EF"><path d="M12 2c.6 4.5 1.5 5.4 6 6-4.5.6-5.4 1.5-6 6-.6-4.5-1.5-5.4-6-6 4.5-.6 5.4-1.5 6-6Z"/></svg>96% match</span>
        <span class="fav"><svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9Z"/></svg></span>
      </div>
      <div class="body">
        <div class="price">R$ 685.000</div>
        <div class="addr">Apto · Jardim Europa, São Paulo</div>
        <div class="feats">
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 12h18M5 12V7h14v5M5 18v-2M19 18v-2"/></svg>2 quartos</span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="10" width="18" height="8" rx="2"/><path d="M7 10V6h4"/></svg>1 vaga</span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>72 m²</span>
        </div>
        <div class="tagrow"><span class="t hot">🔥 Alta procura</span><span class="t">Novo</span></div>
      </div>
    </div>

    <div class="card">
      <div class="photo" style="background:linear-gradient(135deg,#6D28D9,#D946EF)">
        <div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></div>
        <span class="ai-badge"><svg viewBox="0 0 24 24" fill="#D946EF"><path d="M12 2c.6 4.5 1.5 5.4 6 6-4.5.6-5.4 1.5-6 6-.6-4.5-1.5-5.4-6-6 4.5-.6 5.4-1.5 6-6Z"/></svg>88% match</span>
        <span class="fav"><svg viewBox="0 0 24 24" fill="#D946EF" stroke="#D946EF" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9Z"/></svg></span>
      </div>
      <div class="body">
        <div class="price">R$ 1.250.000</div>
        <div class="addr">Casa · Alphaville, Barueri</div>
        <div class="feats">
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 12h18M5 12V7h14v5M5 18v-2M19 18v-2"/></svg>3 quartos</span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="10" width="18" height="8" rx="2"/><path d="M7 10V6h4"/></svg>2 vagas</span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>180 m²</span>
        </div>
        <div class="tagrow"><span class="t">Condomínio</span><span class="t">Piscina</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
