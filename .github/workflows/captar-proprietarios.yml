name: Captar proprietários (gradual)

# Enche o cache de proprietários aos poucos (3ª etapa do backup). Chama /api/captar-cron
# em loop gentil — ~4 imóveis por chamada, pausa entre elas — algumas vezes por dia.
# PARA na hora se o Imoview recusar o login (protege a conta). Resumível (cursor no servidor).
# Pré-requisito: secret BACKUP_CRON_KEY no GitHub (mesmo valor do Cloudflare) — ver docs.

on:
  schedule:
    # SÓ de madrugada (Brasília ~0h-5h = 3h-8h UTC): de dia o Imoview fica degradado/lento
    # (sob carga das imobiliárias) e a raspagem volta vazia — comprovado em jun/2026. À noite
    # funciona liso. Rodar de dia só desperdiça e atrapalha.
    - cron: '20 3-8 * * *'   # de hora em hora, 0h-5h de Brasília
  workflow_dispatch: {}        # botão "Run workflow" pra rodar na hora (testes)

# evita duas execuções ao mesmo tempo (uma de cada vez = mais seguro pro Imoview)
concurrency:
  group: captar-proprietarios
  cancel-in-progress: false

jobs:
  captar:
    runs-on: ubuntu-latest
    steps:
      - name: Captar em lotes pequenos (gentil com o Imoview)
        run: |
          for i in $(seq 1 20); do
            resp=$(curl -fsS --max-time 70 --retry 2 --retry-delay 5 -X POST "https://viniciusgraton.com.br/api/captar-cron" \
              -H "x-backup-key: ${{ secrets.BACKUP_CRON_KEY }}" || echo '{"erro":"http"}')
            echo "lote $i: $resp"
            case "$resp" in
              *'"motivo":"imoview-login"'*) echo "Imoview recusou o login — parando por agora (protege a conta)."; break ;;
              *'"motivo":"cooldown"'*) echo "Em cooldown após falha recente — parando por agora."; break ;;
              *'"restantes":0'*) echo "Varredura completa neste ciclo."; break ;;
            esac
            sleep 25
          done
