name: Exportar imóveis para o aicapitei (diário)

# Envia aos poucos os imóveis elegíveis do catálogo (casas e apartamentos à venda,
# R$ 500 mil ou mais, maiores valores primeiro) pro cadastro do aicapitei, chamando
# /api/exporta-aicapitei em loop gentil — ~4 novos por chamada, teto de 50 novos/dia.
# O proprietário vai junto quando existe no cache; senão o imóvel vai sem owner e o
# enriquecimento reenvia depois. Defasado 15 min do captar-proprietarios pra não
# concorrer na mesma sessão do Imoview.
# Pré-requisitos: secrets BACKUP_CRON_KEY (mesmo do Cloudflare) e AICAPITEI_INGEST_KEY
# no Pages do site (env var). CALLMEBOT_KEY é opcional (aviso no WhatsApp).

on:
  schedule:
    # SÓ de madrugada (Brasília ~1h-5h = 4h-8h UTC): janela em que o Imoview responde
    # liso (mesma constatação do captar-proprietarios). :35 pra não colidir com o :20.
    - cron: '35 4-8 * * *'
    # TRICKLE 24H (pedido do dono 04/07: rodar continuamente, 24h, ritmo seguro, até
    # capturar 100% do acervo ~1348 elegíveis). :15 e :45 de TODA hora, TODO dia = 48
    # disparos/dia, cada um PEQUENO (teto do dia 500, 5 rodadas/disparo, 4-por-vez com
    # pausas). 24h deixa o ritmo/hora ainda mais suave (~21/h). Endpoint para sozinho em
    # 'sem-pendencias' quando a fila zera. Temporário: a supervisão remove quando 100%.
    - cron: '15,45 * * * *'
  workflow_dispatch:      # botão "Run workflow" / mutirão manual
    inputs:
      teto:
        description: 'Teto de NOVOS no dia (mutirão; o endpoint trava em 500)'
        required: false
        default: ''
      rodadas:
        description: 'Quantos lotes chamar nesta execução (padrão 15)'
        required: false
        default: '15'
  push:
    branches: [main]
    paths: ['.mutirao']   # mutirão sem login no Actions: dar push no arquivo dispara

# evita duas execuções ao mesmo tempo (uma de cada vez = mais seguro pro Imoview)
concurrency:
  group: exporta-aicapitei
  cancel-in-progress: false

jobs:
  exportar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exportar em lotes pequenos (gentil com o Imoview e com o ingest)
        id: exportar
        env:
          TETO: ${{ github.event.inputs.teto || '' }}
          RODADAS: ${{ github.event.inputs.rodadas || '15' }}
          EVENTO: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
        run: |
          # mutirão por arquivo: SÓ quando o gatilho foi o push do .mutirao
          # (os crons da madrugada continuam no teto padrão de 50/dia)
          if [ "$EVENTO" = "push" ] && [ -f .mutirao ]; then
            T=$(grep -o 'teto=[0-9]*' .mutirao | head -1 | cut -d= -f2)
            R=$(grep -o 'rodadas=[0-9]*' .mutirao | head -1 | cut -d= -f2)
            [ -n "$T" ] && TETO="$T"
            [ -n "$R" ] && RODADAS="$R"
            echo "mutirão: teto=$TETO rodadas=$RODADAS"
          fi
          # trickle 24h (schedule específico): lote pequeno e espalhado até zerar a fila.
          # Teto do dia 500 (compartilhado no servidor); 5 rodadas/disparo mantém suave.
          if [ "$EVENTO" = "schedule" ] && [ "$CRON" = "15,45 * * * *" ]; then
            TETO=500; RODADAS=5
            echo "trickle 24h: teto=$TETO rodadas=$RODADAS"
          fi
          corpo='{}'
          if [ -n "$TETO" ]; then corpo="{\"teto\":$TETO}"; fi
          # NÃO usar 'set -e' agressivo aqui: um grep sem match (resposta sem "novos")
          # retorna 1 e mataria o passo antes do break. Tratamos tudo na mão.
          set +e
          total=0
          for i in $(seq 1 "$RODADAS"); do
            resp=$(curl -fsS --max-time 90 --retry 2 --retry-delay 5 -X POST "https://viniciusgraton.com.br/api/exporta-aicapitei" \
              -H "x-backup-key: ${{ secrets.BACKUP_CRON_KEY }}" \
              -H "content-type: application/json" -d "$corpo")
            if [ $? -ne 0 ]; then resp='{"erro":"http"}'; fi
            echo "lote $i: $resp"
            # pega o PRIMEIRO "novos" (top-level; o segundo é o ingest.novos aninhado).
            # '|| true' garante que grep-sem-match nunca derruba o passo.
            n=$(printf '%s' "$resp" | grep -o '"novos":[0-9]*' | head -1 | grep -o '[0-9]*$' || true)
            total=$((total + ${n:-0}))
            case "$resp" in
              *'"error":"nao-autorizado"'*) echo "Chave recusada (BACKUP_CRON_KEY) — parando."; break ;;
              *'"erro":"http"'*) echo "Falha HTTP (auth/rede) — parando por agora."; break ;;
              *'"done"'*) echo "Endpoint pediu pra parar (teto do dia, fila vazia ou erro no ingest)."; break ;;
            esac
            sleep 20
          done
          echo "exportados=$total"
          echo "exportados=$total" >> "$GITHUB_OUTPUT"

      - name: Avisar o Vinícius no WhatsApp (só se exportou algo)
        if: steps.exportar.outputs.exportados != '' && steps.exportar.outputs.exportados != '0'
        continue-on-error: true
        run: |
          msg="✅ aicapitei: ${{ steps.exportar.outputs.exportados }} imóvel(is) da Rotina exportado(s) hoje para o cadastro (maiores valores primeiro). Dados de proprietário completam aos poucos."
          curl -fsS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=553491570494" \
            --data-urlencode "text=$msg" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_KEY }}" >/dev/null || true
