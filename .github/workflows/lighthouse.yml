name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Auditar Performance & SEO
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build do site
        run: npm run build

      - name: Instalar Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Rodar Lighthouse
        run: |
          lhci autorun \
            --collect.staticDistDir=./dist \
            --collect.url=/ \
            --collect.url=/imoveis \
            --collect.url=/blog \
            --collect.url=/como-funciona \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=["warn",{"minScore":0.7}] \
            --assert.assertions.categories:accessibility=["warn",{"minScore":0.85}] \
            --assert.assertions.categories:best-practices=["warn",{"minScore":0.85}] \
            --assert.assertions.categories:seo=["error",{"minScore":0.9}] \
            --upload.target=temporary-public-storage
        continue-on-error: true

      - name: Comentar resultado no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json') && !f.includes('assert'));
            if (!files.length) return;
            const results = files.map(f => {
              const r = JSON.parse(fs.readFileSync(`.lighthouseci/${f}`));
              const cats = r.categories;
              return `| ${r.finalUrl || 'page'} | ${Math.round(cats.performance?.score * 100)}% | ${Math.round(cats.accessibility?.score * 100)}% | ${Math.round(cats['best-practices']?.score * 100)}% | ${Math.round(cats.seo?.score * 100)}% |`;
            }).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Lighthouse CI\n\n| URL | Perf | A11y | Best Practices | SEO |\n|-----|------|------|----------------|-----|\n${results}`
            });
