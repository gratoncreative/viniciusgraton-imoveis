<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Banner Open Graph — Vinícius Graton Imóveis">
  <defs>
    <linearGradient id="og-ink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#26365A"/><stop offset="0.6" stop-color="#212b3d"/><stop offset="1" stop-color="#1C2A44"/>
    </linearGradient>
    <linearGradient id="og-red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF4D67"/><stop offset="0.5" stop-color="#EB0128"/><stop offset="1" stop-color="#C20020"/>
    </linearGradient>
    <clipPath id="og-tile"><rect width="48" height="48" rx="13"/></clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#og-ink)"/>
  <path d="M1200 630 L960 390 L1200 390 Z" fill="#FFFFFF" opacity="0.04"/>
  <path d="M0 0 L200 0 L0 200 Z" fill="#FFFFFF" opacity="0.03"/>

  <!-- símbolo + assinatura topo -->
  <g transform="translate(80 70) scale(1.4)">
    <g clip-path="url(#og-tile)">
      <rect width="48" height="48" fill="#212b3d"/>
      <path fill="#F4F2EE" fill-rule="evenodd" d="M24 8.5 L41.5 23 L35.5 23 L35.5 38.5 L12.5 38.5 L12.5 23 L6.5 23 Z M19.7 38.5 L19.7 27.8 L24 31.2 L28.3 27.8 L28.3 38.5 Z"/>
      <path fill="url(#og-red)" d="M24 17.6 L27.2 20.8 L24 24 L20.8 20.8 Z"/>
    </g>
  </g>
  <text x="160" y="98" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="600" fill="#F4F2EE">Vinícius <tspan fill="#FF4D67" font-style="italic">Graton</tspan></text>
  <text x="161" y="125" font-family="Manrope, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8FA0C0" letter-spacing="3">IMÓVEIS · UBERLÂNDIA</text>

  <!-- título -->
  <text x="80" y="320" font-family="Manrope, system-ui, sans-serif" font-size="20" font-weight="700" fill="#FF4D67" letter-spacing="5">CONSULTOR DE IMÓVEIS</text>
  <text x="80" y="400" font-family="Fraunces, 'Playfair Display', Georgia, serif" font-size="68" font-weight="600" fill="#F4F2EE">Compre seu imóvel</text>
  <text x="80" y="478" font-family="Fraunces, 'Playfair Display', Georgia, serif" font-size="68" font-weight="600" font-style="italic" fill="#FF4D67">sem medo de errar.</text>

  <text x="80" y="548" font-family="Manrope, system-ui, sans-serif" font-size="24" fill="#C9CEDA">Consultoria segura e personalizada · do primeiro contato à entrega das chaves.</text>
</svg>
