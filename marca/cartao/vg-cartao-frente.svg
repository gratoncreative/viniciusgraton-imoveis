<svg viewBox="0 0 960 560" width="960" height="560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cartão de visita — frente">
  <!-- Formato 90x50mm + 3mm sangria · 10px = 1mm · corte em 30,30 → 930,530 -->
  <defs>
    <linearGradient id="cf-ink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#26365A"/><stop offset="1" stop-color="#1C2A44"/>
    </linearGradient>
    <linearGradient id="cf-red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF4D67"/><stop offset="0.5" stop-color="#EB0128"/><stop offset="1" stop-color="#C20020"/>
    </linearGradient>
    <clipPath id="cf-tile"><rect width="48" height="48" rx="13"/></clipPath>
  </defs>
  <!-- fundo sangrado -->
  <rect width="960" height="560" fill="url(#cf-ink)"/>
  <!-- losango filigrana decorativo -->
  <path d="M820 560 L960 420 L960 560 Z" fill="#FFFFFF" opacity="0.03"/>
  <path d="M0 0 L120 0 L0 120 Z" fill="#FFFFFF" opacity="0.03"/>

  <!-- símbolo -->
  <g transform="translate(390 130) scale(3.6)">
    <g clip-path="url(#cf-tile)">
      <rect width="48" height="48" fill="#212b3d"/>
      <path fill="#F4F2EE" fill-rule="evenodd" d="M24 8.5 L41.5 23 L35.5 23 L35.5 38.5 L12.5 38.5 L12.5 23 L6.5 23 Z M19.7 38.5 L19.7 27.8 L24 31.2 L28.3 27.8 L28.3 38.5 Z"/>
      <path fill="url(#cf-red)" d="M24 17.6 L27.2 20.8 L24 24 L20.8 20.8 Z"/>
    </g>
    <rect x="0.6" y="0.6" width="46.8" height="46.8" rx="12.4" fill="none" stroke="#F4F2EE" stroke-opacity="0.12"/>
  </g>

  <!-- assinatura -->
  <text x="480" y="380" text-anchor="middle" font-family="Fraunces, 'Playfair Display', Georgia, serif" font-size="56" font-weight="600" fill="#F4F2EE">Vinícius <tspan fill="#FF4D67" font-style="italic">Graton</tspan></text>
  <text x="480" y="420" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="18" font-weight="600" fill="#C9CEDA" letter-spacing="5">IMÓVEIS · UBERLÂNDIA</text>
  <line x1="400" y1="450" x2="560" y2="450" stroke="#FF4D67" stroke-width="2" opacity="0.7"/>
  <text x="480" y="485" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="20" fill="#8FA0C0">“Compre seu imóvel sem medo de errar.”</text>
</svg>
